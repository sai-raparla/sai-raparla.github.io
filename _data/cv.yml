    Projects:
      - name: Secure Embedded Vehicle Control System - Pratt & Whitney
        highlights:
          - Designed and developed a responsive UI using React and Tailwind CSS to send control data to a remote vehicle.
          - Built and deployed an Express.js backend server on a Xilinx ZCU102 board to manage communication between the frontend and embedded hardware.
          - Created a C application to parse AES-GCM encrypted code, securely decrypt command data, and transmit commands to a microcontroller for vehicle control.
          - Configured Nginx as a reverse proxy to support authentication and help secure communication between the user interface and backend services.

      - name: Flask Image API
        highlights:
          - Used Flask to build an image upload API and hosted the website on AWS EC2.
          - Added an Application Load Balancer and Auto Scaling Group (AMI + Launch Template) for scalability and cost efficiency.
          - Configured Security Group inbound rules and used systemd + EC2 user data for automatic startup and restarts.

      - name: Flood Prediction - Kaggle
        highlights:
          - Built an end-to-end regression pipeline to predict flood probability from 20 tabular features plus additional engineered features on a Kaggle flood-risk dataset.
          - Trained an XGBoost gradient-boosted tree model with 5-fold stratified cross-validation and evaluated using R², achieving 0.869 test accuracy.
          - Achieved performance in the same range as Kaggle leaderboard.

